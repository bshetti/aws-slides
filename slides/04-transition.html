<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Elastic Observability Vision</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100vh;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      background: #2363F4;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateX(-24px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    /* Spring pop: used per tile */
    @keyframes tile-in {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: var(--op, 0.82); transform: scale(1); }
    }

    .trans-label  { opacity: 0; animation: slide-in 0.6s ease forwards 0.5s; }
    .trans-title  { opacity: 0; animation: slide-in 0.7s ease forwards 0.7s; }
    .cover-footer { opacity: 0; animation: slide-in 0.6s ease forwards 1.1s; }

    /* ── Mosaic grid ── */
    .mosaic-wrap {
      position: fixed;
      right: 0; top: 50%;
      transform: translateY(-50%);
      width: min(50vw, 82vh);
      display: grid;
      grid-template-columns: repeat(32, 1fr);
      gap: clamp(2px, 0.2vw, 3px);
      padding: clamp(2px, 0.2vw, 3px);
      pointer-events: none;
      z-index: 1;
    }
    .m-tile {
      aspect-ratio: 1;
      border-radius: clamp(2px, 0.2vw, 3.5px);
    }
    .m-tile.colored {
      opacity: 0;
      animation: tile-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards var(--d, 0s);
    }

    /* ── Content ── */
    .content {
      position: relative; z-index: 10;
      padding: 0 7vw;
      flex: 1;
      display: flex; flex-direction: column;
      justify-content: center;
      max-width: 52%;
    }
    .trans-label {
      font-size: clamp(0.65rem, 0.8vw, 1rem);
      font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: clamp(1.2rem, 1.8vw, 2.5rem);
    }
    .trans-title {
      font-size: clamp(3.2rem, 5.8vw, 7.5rem);
      font-weight: 800; letter-spacing: -0.03em; line-height: 1.04;
      color: #fff;
    }

    /* ── Footer ── */
    .cover-footer {
      position: relative; z-index: 10;
      padding: clamp(1.5rem, 2vw, 2.5rem) 7vw;
      display: flex; align-items: center; gap: 1.25rem;
    }
    .elastic-logo { display: flex; align-items: center; gap: 0.75rem; }
    .elastic-wordmark { font-size: 1.3rem; font-weight: 700; color: #fff; letter-spacing: -0.01em; }
    .footer-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.25); }
    .footer-tagline { font-size: 0.78rem; color: rgba(255,255,255,0.55); line-height: 1.4; }
  </style>
</head>
<body>

  <div class="mosaic-wrap" id="mosaic"></div>

  <div class="content">
    <div class="trans-label">Elastic Observability · Vision</div>
    <h1 class="trans-title">Autonomous o11y Agents</h1>
  </div>

  <div class="cover-footer">
    <div class="elastic-logo">
      <svg width="42" height="41" viewBox="0 0 245 236" xmlns="http://www.w3.org/2000/svg">
        <path d="M236.6 123.5a46.54 46.54 0 0 0-30.8-43.9A67 67 0 0 0 140.2 0 66.72 66.72 0 0 0 86 27.7a35.5 35.5 0 0 0-57.2 28.1A36.77 36.77 0 0 0 31 68.2a46.75 46.75 0 0 0-.1 88 66.66 66.66 0 0 0 119.6 51.6 35 35 0 0 0 21.7 7.6 35.51 35.51 0 0 0 35.5-35.5 36.77 36.77 0 0 0-2.2-12.4 47.08 47.08 0 0 0 31.1-44" fill="#fff"/>
        <path d="M93 101.5l51.8 23.6L197 79.3a54.71 54.71 0 0 0 1.1-11.5 58.35 58.35 0 0 0-106.5-33l-8.7 45.1L93 101.5z" fill="#fed10a"/>
        <path d="M39.4 156.3a56.62 56.62 0 0 0-1.1 11.7 58.58 58.58 0 0 0 107 32.9l8.6-44.9-11.5-22-52-23.7z" fill="#24bbb1"/>
        <path d="M39.1 66.7l35.5 8.4 7.8-40.3a28 28 0 0 0-43.3 31.9" fill="#ef5098"/>
        <path d="M36 75.2a39.1 39.1 0 0 0-1.7 73.7l49.8-45L75 84.4z" fill="#17a8e0"/>
        <path d="M154.3 200.9a28 28 0 0 0 43.2-31.9l-35.4-8.3z" fill="#93c83e"/>
        <path d="M161.5 151.4l39 9.1a39.1 39.1 0 0 0 1.7-73.7l-51 44.7z" fill="#0779a1"/>
      </svg>
      <span class="elastic-wordmark">elastic</span>
    </div>
    <div class="footer-divider"></div>
    <div class="footer-tagline">The Search<br>AI Company</div>
  </div>

  <script>
  (function () {
    const C = {
      G: '#fed10a',
      T: '#24bbb1',
      P: '#ef5098',
      B: '#17a8e0',
      E: '#93c83e',
      D: '#0779a1',
    };

    const COLS = 32, ROWS = 32;
    const centerX = (COLS - 1) / 2;
    const centerY = (ROWS - 1) / 2;

    /* Rasterise the Elastic logo at full SVG scale (652px), auto-detect the
       bounding box, then sample each tile's centre pixel from the hi-res canvas.
       This guarantees colours are exact (no blending artifacts from downscaling).
       Paths and hex values taken directly from Elastic_NV_logo.svg. */
    function rasterizeLogo() {
      const SIZE = 652;
      const big = document.createElement('canvas');
      big.width = SIZE; big.height = SIZE;
      const bctx = big.getContext('2d');

      // Exact paths + colours from Elastic_NV_logo.svg
      [
        ['#fed10a', 'm101.9 306.9 45.2 20.6 45.6-40c.7-3.3 1-6.5 1-10 0-28.1-22.9-51-51-51-16.8 0-32.5 8.3-42 22.2l-7.6 39.3z'],
        ['#24bbb1', 'm55.1 354.7c-.7 3.3-1 6.7-1 10.2 0 28.2 23 51.1 51.1 51.1 16.9 0 32.7-8.4 42.2-22.3l7.5-39.2-10-19.2-45.4-20.7z'],
        ['#ef5098', 'm54.9 276.5 31 7.3 6.8-35.2c-4.2-3.2-9.4-5-14.8-5-13.4 0-24.4 10.9-24.4 24.4-.1 3 .4 5.9 1.4 8.5'],
        ['#17a8e0', 'm52.2 283.9c-13.8 4.5-23.5 17.8-23.5 32.4 0 14.2 8.8 26.9 22 31.9l43.4-39.2-7.9-17z'],
        ['#93c83e', 'm155.4 393.6c4.3 3.2 9.4 5.1 14.7 5.1 13.4 0 24.4-10.9 24.4-24.4 0-3-.5-5.8-1.5-8.5l-30.9-7.2z'],
        ['#0779a1', 'm161.7 350.4 34 7.9c13.9-4.5 23.5-17.8 23.5-32.5 0-14.1-8.8-26.9-22-31.9l-44.5 39z'],
      ].forEach(([color, d]) => {
        bctx.fillStyle = color;
        bctx.fill(new Path2D(d));
      });

      // Auto-detect bounding box of drawn pixels
      const bd = bctx.getImageData(0, 0, SIZE, SIZE).data;
      let x0 = SIZE, y0 = SIZE, x1 = 0, y1 = 0;
      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          if (bd[(y * SIZE + x) * 4 + 3] > 0) {
            if (x < x0) x0 = x; if (y < y0) y0 = y;
            if (x > x1) x1 = x; if (y > y1) y1 = y;
          }
        }
      }
      x0 = Math.max(0, x0 - 1); y0 = Math.max(0, y0 - 1);
      x1 = Math.min(SIZE - 1, x1 + 1); y1 = Math.min(SIZE - 1, y1 + 1);
      const bw = x1 - x0 + 1, bh = y1 - y0 + 1;

      // Sample the centre pixel of each tile from the hi-res canvas.
      // This avoids blending — every sampled pixel is either a pure logo
      // colour or transparent (no anti-aliased mixes).
      const out = new Uint8ClampedArray(COLS * ROWS * 4);
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const bx = Math.round(x0 + (c + 0.5) / COLS * bw);
          const by = Math.round(y0 + (r + 0.5) / ROWS * bh);
          const bi = (by * SIZE + bx) * 4;
          const ti = (r  * COLS + c) * 4;
          out[ti] = bd[bi]; out[ti+1] = bd[bi+1];
          out[ti+2] = bd[bi+2]; out[ti+3] = bd[bi+3];
        }
      }
      return out;
    }

    /* Snap any anti-aliased edge pixel to the nearest exact logo colour */
    const colorEntries = Object.entries(C).map(([k, hex]) => ({
      k,
      r: parseInt(hex.slice(1, 3), 16),
      g: parseInt(hex.slice(3, 5), 16),
      b: parseInt(hex.slice(5, 7), 16),
    }));
    function nearestKey(r, g, b) {
      return colorEntries.reduce((best, c) => {
        const d = (r - c.r) ** 2 + (g - c.g) ** 2 + (b - c.b) ** 2;
        return d < best.d ? { d, k: c.k } : best;
      }, { d: Infinity, k: null }).k;
    }

    const pixels    = rasterizeLogo();
    const wrap      = document.getElementById('mosaic');
    const waveTiles = [];
    let readyCount  = 0, totalColored = 0;

    for (let i = 3; i < pixels.length; i += 4) {
      if (pixels[i] > 128) totalColored++;
    }

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const tile = document.createElement('div');
        tile.className = 'm-tile';
        const i = (r * COLS + c) * 4;

        if (pixels[i + 3] > 128) {
          /* Coloured logo tile */
          const key = nearestKey(pixels[i], pixels[i + 1], pixels[i + 2]);
          tile.classList.add('colored');
          tile.style.background = C[key];

          const op    = (0.68 + ((r * 3 + c * 7) % 6) * 0.04).toFixed(2);
          const delay = (r * 0.018 + c * 0.008).toFixed(2);
          tile.style.setProperty('--op', op);
          tile.style.setProperty('--d', delay + 's');

          tile.addEventListener('animationend', () => {
            tile.style.opacity   = op;
            tile.style.animation = 'none';
            const dx = c - centerX, dy = r - centerY;
            waveTiles.push({ el: tile, dist: Math.sqrt(dx * dx + dy * dy) / 2 });
            if (++readyCount === totalColored) startWave();
          }, { once: true });

        } else {
          /* Empty cell — fully transparent so the blue background shows through */
          tile.style.background = 'transparent';
        }

        wrap.appendChild(tile);
      }
    }

    function startWave() {
      const speed = 3.2, sigma = 1.1, A = 0.24, period = 5.0;
      (function frame(time) {
        const t = (time * 0.001) % period;
        const radius = t * speed;
        waveTiles.forEach(({ el, dist }) => {
          const d = dist - radius;
          const s = 1 + A * Math.exp(-(d * d) / (2 * sigma * sigma));
          el.style.transform = `scale(${s.toFixed(4)})`;
        });
        requestAnimationFrame(frame);
      })(0);
    }
  }());
  </script>

<script src="js/main.js"></script>
</body>
</html>
