<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Title Slide</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; background: #0A1520; color: #fff; display: flex; align-items: center; justify-content: center; }
    h1 { font-size: clamp(3rem, 7vw, 8rem); font-weight: 900; letter-spacing: -0.04em; }
    p  { font-size: clamp(1rem, 1.8vw, 2rem); color: rgba(255,255,255,0.5); margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div>
    <h1>Your Title Here</h1>
    <p>Subtitle or tagline</p>
  </div>
  <script src="/js/fuckslides.js"></script>
</body>
</html>
