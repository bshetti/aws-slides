<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>6x storage improvement</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,700;0,900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1280px; height: 720px; overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #fff;
    }

    .slide {
      width: 1280px; height: 720px;
      display: flex; flex-direction: column;
    }

    /* ── Layout ── */
    .layout {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 70px;
    }

    /* ── Cards ── */
    .card {
      width: 490px;
      border-radius: 22px;
      padding: 44px 52px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card-old { background: #EEF1F8; }

    .card-new {
      background: #1D55E0;
      opacity: 0;
      transform: translateX(28px);
    }
    .card-new.show {
      transition: opacity 0.45s ease-out, transform 0.45s cubic-bezier(0.2, 0, 0.2, 1);
      opacity: 1;
      transform: translateX(0);
    }

    .card-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .card-old .card-label { color: #7A8499; }
    .card-new .card-label { color: rgba(255,255,255,0.7); }

    /* ── Odometer ── */
    .odometer {
      display: flex;
      align-items: flex-end;
      font-size: 152px;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #1A2035;
      margin-bottom: 24px;
    }

    .odo-slot {
      height: 152px;
      overflow: hidden;
      display: inline-block;
    }

    .odo-strip {
      display: flex;
      flex-direction: column;
    }

    .odo-digit {
      height: 152px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    /* decimal point — nudge up so it sits at baseline optically */
    .odo-sep {
      display: inline-flex;
      align-items: flex-end;
      height: 152px;
      padding-bottom: 18px;
      line-height: 1;
    }

    /* ── New number ── */
    .new-number {
      font-size: 152px;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #fff;
      margin-bottom: 24px;
      opacity: 0;
      transform: scale(1.22);
      filter: blur(5px);
    }
    .new-number.pop {
      transition:
        opacity 0.5s ease-out,
        transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
        filter 0.45s ease-out;
      opacity: 1;
      transform: scale(1);
      filter: blur(0px);
    }

    .card-unit {
      font-size: 22px;
      font-weight: 500;
    }
    .card-old .card-unit { color: #5A6480; }
    .card-new .card-unit { color: rgba(255,255,255,0.85); }

    /* ── Arrow ── */
    .arrow-area {
      width: 160px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0;
      user-select: none;
      -webkit-user-select: none;
    }
    .arrow-area.show {
      transition: opacity 0.35s ease-out;
      opacity: 1;
    }

    .arrow-label {
      font-size: 16px;
      font-weight: 800;
      color: #1D55E0;
      text-align: center;
      line-height: 1.3;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0 66px 24px;
    }
  </style>
</head>
<body>
<div class="slide">

  <div class="layout">

    <div class="card card-old">
      <div class="card-label">Last Year</div>
      <div class="odometer" id="odo"></div>
      <div class="card-unit">bytes / datapoint</div>
    </div>

    <div class="arrow-area" id="arrow">
      <div class="arrow-label"><span>6x</span><span>improvement</span></div>
      <svg width="60" height="22" viewBox="0 0 60 22" fill="none">
        <path d="M2 11H56M56 11L46 2M56 11L46 20" stroke="#1D55E0" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="card card-new" id="card-new">
      <div class="card-label">Today</div>
      <div class="new-number" id="new-number">3.75</div>
      <div class="card-unit">bytes / datapoint</div>
    </div>

  </div>

  <div class="footer">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 687.5 235.6" style="height:26px;width:auto;display:block"><title>elastic</title><path d="M236.6 123.5a46.54 46.54 0 0 0-30.8-43.9A67 67 0 0 0 140.2 0 66.72 66.72 0 0 0 86 27.7a35.5 35.5 0 0 0-57.2 28.1A36.77 36.77 0 0 0 31 68.2a46.75 46.75 0 0 0-.1 88 66.66 66.66 0 0 0 119.6 51.6 35 35 0 0 0 21.7 7.6 35.51 35.51 0 0 0 35.5-35.5 36.77 36.77 0 0 0-2.2-12.4 47.08 47.08 0 0 0 31.1-44" fill="#fff"/><path d="M93 101.5l51.8 23.6L197 79.3a54.71 54.71 0 0 0 1.1-11.5 58.35 58.35 0 0 0-106.5-33l-8.7 45.1L93 101.5z" fill="#fed10a"/><path d="M39.4 156.3a56.62 56.62 0 0 0-1.1 11.7 58.58 58.58 0 0 0 107 32.9l8.6-44.9-11.5-22-52-23.7z" fill="#24bbb1"/><path d="M39.1 66.7l35.5 8.4 7.8-40.3a28 28 0 0 0-43.3 31.9" fill="#ef5098"/><path d="M36 75.2a39.1 39.1 0 0 0-1.7 73.7l49.8-45L75 84.4z" fill="#17a8e0"/><path d="M154.3 200.9a28 28 0 0 0 43.2-31.9l-35.4-8.3z" fill="#93c83e"/><path d="M161.5 151.4l39 9.1a39.1 39.1 0 0 0 1.7-73.7l-51 44.7z" fill="#0779a1"/><path fill="#1a1a1a" d="M330.8 165.5l4.7-.5.3 9.6a240.62 240.62 0 0 1-31.8 2.6q-17.55 0-24.9-10.2c-4.9-6.8-7.3-17.4-7.3-31.7q0-42.9 34.1-42.9c11 0 19.2 3.1 24.6 9.2s8.1 15.8 8.1 28.9l-.7 9.3h-53.8c0 9 1.6 15.7 4.9 20s8.9 6.5 17 6.5a230 230 0 0 0 24.8-.8zm-4.4-35.3c0-10-1.6-17.1-4.8-21.2s-8.4-6.2-15.6-6.2-12.7 2.2-16.3 6.5-5.5 11.3-5.6 20.9h42.3zm29.2 45.5v-117h12.2v117h-12.2zm89.3-56.9v40.1c0 4.1 10.1 4.9 10.1 4.9l-.6 10.8c-8.6 0-15.7.7-20-3.4a71.68 71.68 0 0 1-29.3 6.1c-7.5 0-13.2-2.1-17.1-6.4s-5.9-10.3-5.9-18.3 2-13.8 6-17.5 10.3-6.1 18.9-6.9l25.6-2.4v-7c0-5.5-1.2-9.5-3.6-11.9s-5.7-3.6-9.8-3.6h-32.1V92.5h31.3c9.2 0 15.9 2.1 20.1 6.4s6.4 10.9 6.4 19.9zM394.7 152c0 10 4.1 15 12.4 15a65.27 65.27 0 0 0 21.8-3.7l3.7-1.3v-26.9l-24.1 2.3c-4.9.4-8.4 1.8-10.6 4.2s-3.2 5.9-3.2 10.4zm97.9-48.6c-11.8 0-17.8 4.1-17.8 12.4 0 3.8 1.4 6.5 4.1 8.1s8.9 3.2 18.6 4.9 16.5 4 20.5 7.1 6 8.7 6 17.1-2.7 14.5-8.1 18.4-13.2 5.9-23.6 5.9c-6.7 0-29.2-2.5-29.2-2.5l.7-10.6c12.9 1.2 22.3 2.2 28.6 2.2s11.1-1 14.4-3 5-5.4 5-10.1-1.4-7.9-4.2-9.6-9-3.3-18.6-4.8-16.4-3.7-20.4-6.7-6-8.4-6-16.3 2.8-13.8 8.4-17.6 12.6-5.7 20.9-5.7c6.6 0 29.6 1.7 29.6 1.7V105c-12.1-.7-22-1.6-28.9-1.6zm90.4 1.4h-25.9v39c0 9.3.7 15.5 2 18.4s4.6 4.4 9.7 4.4l14.5-1 .8 10.1a111.1 111.1 0 0 1-16.6 1.8c-8.5 0-14.3-2.1-17.6-6.2s-4.9-12-4.9-23.6v-42.9h-11.6V94.2H545v-25h12.1v24.9H583v10.7zm17-29.1V61.6h12.2v14.2zm0 100V94.2h12.2v81.5H600zm65.2-83.2c3.6 0 9.7.7 18.3 2l3.9.5-.5 9.9a187.31 187.31 0 0 0-19.2-1.5c-9.2 0-15.5 2.2-18.8 6.6s-5 12.6-5 24.5 1.5 20.2 4.6 24.9 9.5 7 19.3 7l19.2-1.5.5 10.1c-10.1 1.5-17.7 2.3-22.7 2.3-12.7 0-21.5-3.3-26.3-9.8s-7.3-17.5-7.3-33 2.6-26.4 7.8-32.6 14-9.4 26.2-9.4z"/></svg>
  </div>

</div>

<script>
const LINE_H = 152;
const odoEl  = document.getElementById('odo');

// Build odometer strips for "20.68"
'25'.split('').forEach(ch => {
  if (ch === '.') {
    const sep = document.createElement('span');
    sep.className = 'odo-sep';
    sep.textContent = '.';
    odoEl.appendChild(sep);
    return;
  }
  const digit = parseInt(ch);
  const slot  = document.createElement('span');
  slot.className = 'odo-slot';
  const strip = document.createElement('span');
  strip.className = 'odo-strip';
  // 40 digits: 0-9 repeated 4×
  for (let i = 0; i < 40; i++) {
    const n = document.createElement('span');
    n.className = 'odo-digit';
    n.textContent = i % 10;
    strip.appendChild(n);
  }
  slot.dataset.target = digit;
  slot.appendChild(strip);
  odoEl.appendChild(slot);
});

// Phase 1 — roll odometer (0.3s delay, 1.5s duration)
setTimeout(() => {
  document.querySelectorAll('.odo-slot').forEach(slot => {
    const target = parseInt(slot.dataset.target);
    const strip  = slot.querySelector('.odo-strip');
    const y = (30 + target) * LINE_H; // 3 full rotations + land on target
    strip.style.transition = `transform 1.5s ease-out`;
    strip.style.transform  = `translateY(-${y}px)`;
  });
}, 300);

// Phase 2 — arrow appears (1.9s)
setTimeout(() => document.getElementById('arrow').classList.add('show'), 1900);

// Phase 3 — right card slides in (2.0s)
setTimeout(() => document.getElementById('card-new').classList.add('show'), 2000);

// Phase 4 — 3.75 springs in (2.35s)
setTimeout(() => document.getElementById('new-number').classList.add('pop'), 2350);
</script>

<script src="/js/fuckslides.js"></script>
</body>
</html>
