<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Who's talking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1280px; height: 720px; overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #fff;
    }

    .slide {
      width: 1280px; height: 720px;
      display: flex; flex-direction: column;
      padding: 48px 66px 24px;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes card-up {
      from { opacity: 0; transform: translateY(26px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes draw-line {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }
    @keyframes dot-in {
      from { opacity: 0; transform: scale(0.4); }
      to   { opacity: 1; transform: scale(1); }
    }

    .label {
      font-size: 12px; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: #A8B2CC;
      margin-bottom: 10px;
      opacity: 0; animation: fade-up 0.5s ease forwards 0.1s;
    }

    .title {
      font-size: 60px; font-weight: 900; line-height: 1.06;
      letter-spacing: -0.02em; color: #0D0D0D;
      margin-bottom: 30px;
      opacity: 0; animation: fade-up 0.55s ease forwards 0.2s;
    }
    .title .blue { color: #1D55E0; }

    .body {
      flex: 1; min-height: 0;
      display: flex; align-items: center; justify-content: center;
      gap: 0;
      position: relative;
    }

    .card {
      flex: 1; max-width: 460px;
      border-radius: 20px;
      border: 1px solid #DDE1EE;
      background: #F2F5FB;
      padding: 40px 40px 44px;
      display: flex; flex-direction: column;
      opacity: 0;
    }
    .card.left  { animation: card-up 0.6s cubic-bezier(0.22,1,0.36,1) both 0.35s; }
    .card.right { animation: card-up 0.6s cubic-bezier(0.22,1,0.36,1) both 0.5s; }

    .avatar {
      width: 74px; height: 74px; border-radius: 50%;
      background: #1D55E0; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 900; letter-spacing: -0.02em;
      margin-bottom: 24px;
    }
    .card.right .avatar { background: #0D0D0D; }

    .person-name {
      font-size: 34px; font-weight: 900; color: #0D0D0D;
      letter-spacing: -0.02em; line-height: 1.05;
      margin-bottom: 8px;
    }
    .person-role {
      font-size: 16px; font-weight: 700; color: #1D55E0;
      margin-bottom: 18px;
    }
    .card.right .person-role { color: #3A4060; }

    .person-note {
      font-size: 15px; font-weight: 400; color: #5A6280;
      line-height: 1.55;
    }

    /* center connector */
    .connector {
      width: 132px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .conn-line {
      position: absolute; left: 6px; right: 6px; top: 50%;
      height: 3px; background: #C6D0E8; border-radius: 2px;
      transform: scaleX(0); transform-origin: center;
      animation: draw-line 0.6s ease forwards 0.75s;
    }
    .conn-dot {
      position: relative; z-index: 2;
      width: 52px; height: 52px; border-radius: 50%;
      background: #fff; border: 3px solid #1D55E0;
      display: flex; align-items: center; justify-content: center;
      color: #1D55E0; font-size: 22px;
      opacity: 0; animation: dot-in 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards 1.05s;
    }

    .footer {
      display: flex; justify-content: flex-end; align-items: center;
      padding-top: 12px;
    }
  </style>
</head>
<body>
<div class="slide">

  <div class="label">Kubernetes Observability, Reimagined</div>
  <div class="title">Let's talk about <span class="blue">K8s investigations.</span></div>

  <div class="body">

    <div class="card left">
      <div class="avatar">B</div>
      <div class="person-name">Bahubali Shetti</div>
      <div class="person-role">Observability Technical Solutions</div>
    </div>

    <div class="connector">
      <div class="conn-line"></div>
      <div class="conn-dot">&#8644;</div>
    </div>

    <div class="card right">
      <div class="avatar">JM</div>
      <div class="person-name">Jesse Miller</div>
      <div class="person-role">Product Manager · Observability</div>
    </div>

  </div>
