<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meet your AI SRE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep:     #050D1A;
      --bg-card:     #0A1628;
      --blue-bright: #38BDF8;
      --blue-light:  #7DD3FC;
      --blue-mid:    #0EA5E9;
      --blue-dim:    #1E3A5F;
      --blue-glow:   rgba(56,189,248,0.08);
      --danger:      #F87171;
      --success:     #34D399;
      --text-primary:   #FFFFFF;
      --text-secondary: #94B8D4;
      --text-muted:     #4A7A9B;
      --border: rgba(30, 58, 95, 0.7);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1280px; height: 720px; overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--bg-deep);
      color: var(--text-primary);
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(rgba(56,189,248,0.09) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      top: -15%; left: -5%;
      width: 55%; height: 70%;
      background: radial-gradient(ellipse, rgba(56,189,248,0.06) 0%, transparent 65%);
      pointer-events: none;
    }

    @keyframes fade-up  { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:none; } }
    @keyframes fade-in  { from { opacity:0; } to { opacity:1; } }

    .slide {
      width: 1280px; height: 720px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 38px 77px;
      position: relative;
    }

    .slide-inner {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      align-items: center;
      gap: 36px;
      width: 100%;
      max-width: 1200px;
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--blue-bright);
      display: flex;
      align-items: center;
      gap: 0.65rem;
      opacity: 0;
      animation: fade-up 0.5s ease forwards 0.2s;
    }
    .eyebrow::before {
      content: '';
      display: inline-block;
      width: 28px; height: 1px;
      background: var(--blue-bright);
      flex-shrink: 0;
    }
    .eyebrow svg { flex-shrink: 0; filter: drop-shadow(0 0 4px rgba(56,189,248,0.6)); }

    .hero-title {
      font-size: 83px;
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.04em;
      opacity: 0;
      animation: fade-up 0.65s cubic-bezier(0.2,0,0.2,1) forwards 0.55s;
    }
    .gradient-text {
      background: linear-gradient(135deg, var(--blue-bright) 0%, var(--blue-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 19px;
      color: var(--text-secondary);
      line-height: 1.55;
      font-weight: 400;
      max-width: 520px;
      opacity: 0;
      animation: fade-up 0.55s ease forwards 0.9s;
    }

    .hero-body {
      font-size: 13px;
      color: var(--text-muted);
      max-width: 460px;
      opacity: 0;
      animation: fade-up 0.5s ease forwards 1.1s;
    }

    .hero-btns {
      display: flex;
      gap: 0.85rem;
      flex-wrap: wrap;
      opacity: 0;
      animation: fade-up 0.5s ease forwards 1.3s;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      padding: 10px 20px;
      background: linear-gradient(135deg, var(--blue-mid), var(--blue-bright));
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(56,189,248,0.25);
      white-space: nowrap;
    }
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      padding: 10px 20px;
      background: transparent;
      color: var(--blue-bright);
      font-size: 12px;
      font-weight: 600;
      border-radius: 8px;
      border: 1px solid var(--blue-dim);
      text-decoration: none;
      white-space: nowrap;
    }

    .right {
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: fade-in 0.7s ease forwards 1.6s;
    }

    .hv-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px 22px;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      box-shadow: 0 0 60px rgba(56,189,248,0.07), 0 24px 48px rgba(0,0,0,0.45);
      width: 100%;
      max-width: 520px;
    }

    .hv-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 9px;
    }
    .hv-status { display: flex; align-items: center; gap: 0.45rem; }
    .hv-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--danger);
      flex-shrink: 0;
      animation: hv-pulse-red 1.4s ease-in-out infinite;
    }
    .hv-dot.resolved {
      background: var(--success);
      animation: none;
      box-shadow: 0 0 8px rgba(52,211,153,0.5);
    }
    @keyframes hv-pulse-red {
      0%,100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.5); }
      50%      { box-shadow: 0 0 0 5px rgba(248,113,113,0); }
    }
    .hv-status-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--danger);
      letter-spacing: 0.02em;
      transition: color 0.4s;
    }
    .hv-status-label.resolved { color: var(--success); }
    .hv-ts {
      font-size: 13px;
      color: var(--text-muted);
    }

    .hv-channel {
      font-size: 13px;
      color: var(--text-muted);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
      letter-spacing: 0.03em;
    }

    .hv-thread {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 380px;
      overflow-y: scroll;
      scrollbar-width: none;
    }
    .hv-thread::-webkit-scrollbar { display: none; }

    .hv-msg {
      display: flex;
      gap: 0.5rem;
      opacity: 0;
      transform: translateY(5px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .hv-msg.visible { opacity: 1; transform: none; }

    .hv-avatar {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
    }
    .hv-avatar.bot   { background: rgba(56,189,248,0.15); border: 1px solid rgba(56,189,248,0.25); color: #38BDF8; }
    .hv-avatar.human { background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.25); color: #A78BFA; }

    .hv-msg-body { flex: 1; min-width: 0; }

    .hvm-sender {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 0.18rem;
      font-family: 'Inter', sans-serif;
    }
    .hvm-sender.bot   { color: #38BDF8; }
    .hvm-sender.human { color: #A78BFA; }

    .hvm-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.18rem;
      font-family: 'Inter', sans-serif;
    }
    .hvm-title.danger   { color: var(--danger); }
    .hvm-title.resolved { color: var(--success); }

    .hvm-body {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      font-family: 'Inter', sans-serif;
    }

    .hvm-code {
      font-size: 13px;
      color: var(--blue-light);
      background: rgba(56,189,248,0.06);
      border: 1px solid rgba(56,189,248,0.12);
      border-radius: 4px;
      padding: 0.28rem 0.55rem;
      margin-top: 0.22rem;
      line-height: 1.55;
    }

    .hvm-bullets {
      font-size: 13px;
      color: var(--text-secondary);
      display: flex; flex-direction: column; gap: 0.12rem;
      margin-top: 0.18rem;
      font-family: 'Inter', sans-serif;
    }

    .hvm-actions {
      display: flex; gap: 0.35rem; margin-top: 0.45rem;
    }
    .hvm-btn-approve, .hvm-btn-decline {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 0.28rem 0.7rem;
      border-radius: 4px; cursor: default; border: 1px solid;
      transition: all 0.2s;
    }
    .hvm-btn-approve {
      background: rgba(52,211,153,0.12);
      border-color: rgba(52,211,153,0.25); color: #34D399;
    }
    .hvm-btn-approve.clicked {
      background: rgba(52,211,153,0.3);
      border-color: #34D399;
      box-shadow: 0 0 10px rgba(52,211,153,0.3);
    }
    .hvm-btn-decline {
      background: transparent;
      border-color: var(--border); color: var(--text-muted);
    }

    .hvm-tests {
      display: flex; flex-direction: column; gap: 0.12rem; margin-top: 0.18rem;
    }
    .hvm-test {
      font-size: 13px;
      line-height: 1.4;
      font-family: 'Inter', sans-serif;
    }
    .hvm-test.pass { color: var(--success); }

    .hvm-stats {
      display: flex; gap: 0.9rem; margin-top: 0.22rem;
      font-size: 13px;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
    }
    .hvm-stats strong { color: var(--success); }
  </style>
</head>
<body>

<div class="slide">
  <div class="slide-inner">

    <div class="left">
      <div class="eyebrow">
        <svg width="18" height="18" viewBox="30 215 220 220" xmlns="http://www.w3.org/2000/svg"><path d="m101.9 306.9 45.2 20.6 45.6-40c.7-3.3 1-6.5 1-10 0-28.1-22.9-51-51-51-16.8 0-32.5 8.3-42 22.2l-7.6 39.3z" fill="#38BDF8"/><path d="m55.1 354.7c-.7 3.3-1 6.7-1 10.2 0 28.2 23 51.1 51.1 51.1 16.9 0 32.7-8.4 42.2-22.3l7.5-39.2-10-19.2-45.4-20.7z" fill="#38BDF8"/><path d="m54.9 276.5 31 7.3 6.8-35.2c-4.2-3.2-9.4-5-14.8-5-13.4 0-24.4 10.9-24.4 24.4-.1 3 .4 5.9 1.4 8.5" fill="#38BDF8"/><path d="m52.2 283.9c-13.8 4.5-23.5 17.8-23.5 32.4 0 14.2 8.8 26.9 22 31.9l43.4-39.2-7.9-17z" fill="#38BDF8"/><path d="m155.4 393.6c4.3 3.2 9.4 5.1 14.7 5.1 13.4 0 24.4-10.9 24.4-24.4 0-3-.5-5.8-1.5-8.5l-30.9-7.2z" fill="#38BDF8"/><path d="m161.7 350.4 34 7.9c13.9-4.5 23.5-17.8 23.5-32.5 0-14.1-8.8-26.9-22-31.9l-44.5 39z" fill="#38BDF8"/></svg>
        Nightshift
      </div>

      <h1 class="hero-title">
        Meet your<br>
        <span class="gradient-text">AI SRE.</span>
      </h1>

      <p class="hero-sub">Always watching, always learning, always ready.</p>
      <p class="hero-body">Connect your data. The rest takes care of itself.</p>

    </div>

    <div class="right">
      <div class="hv-card" id="hvCard">
        <div class="hv-topbar">
          <div class="hv-status">
            <span class="hv-dot" id="hvDot"></span>
            <span class="hv-status-label" id="hvStatusLabel">Incident detected</span>
          </div>
          <span class="hv-ts">03:47 AM</span>
        </div>
        <div class="hv-channel"># incidents-production</div>
        <div class="hv-thread" id="hvThread"></div>
      </div>
    </div>

  </div>
</div>

<script>
(function initHeroAnimation() {
  const dot         = document.getElementById('hvDot');
  const statusLabel = document.getElementById('hvStatusLabel');
  const thread      = document.getElementById('hvThread');
  if (!dot || !thread) return;

  const MESSAGES = [
    {
      delay: 800,
      type: 'bot',
      html: `<div class="hvm-title danger">🔴 Incident detected</div>
             <div class="hvm-body">payment-service · memory exhaustion<br>3 downstream services affected</div>`
    },
    {
      delay: 2200,
      type: 'bot',
      html: `<div class="hvm-title">Root cause identified</div>
             <div class="hvm-code">Redis connection pool exhausted<br>node-03 · active: 100/100 · queued: 847</div>`
    },
    {
      delay: 3800,
      type: 'bot',
      html: `<div class="hvm-title">Proposed remediation</div>
             <div class="hvm-bullets">
               <span>↳ Restart Redis connection pool on node-03</span>
               <span>↳ Apply backpressure limit: 80 connections</span>
             </div>
             <div class="hvm-actions">
               <button class="hvm-btn-approve" id="hvApprove">Approve</button>
               <button class="hvm-btn-decline">Decline</button>
             </div>`
    },
    {
      delay: 5600,
      type: 'human',
      html: `<div class="hvm-body">✓ Approved</div>`
    },
    {
      delay: 6400,
      type: 'bot',
      html: `<div class="hvm-title">Opening pull request…</div>
             <div class="hvm-code">PR #247 opened · main ← fix/redis-pool-exhaustion<br>2 files changed · auto-merge on green</div>`
    },
    {
      delay: 8000,
      type: 'bot',
      html: `<div class="hvm-title">Running test suite…</div>
             <div class="hvm-tests">
               <div class="hvm-test pass">✓ payment-service · 12/12 passed</div>
               <div class="hvm-test pass">✓ checkout-service · 8/8 passed</div>
               <div class="hvm-test pass">✓ order-service · 6/6 passed</div>
             </div>`
    },
    {
      delay: 9600,
      type: 'bot',
      resolved: true,
      html: `<div class="hvm-title resolved">✓ Incident closed · 03:51 AM</div>
             <div class="hvm-stats">
               <span>Duration: <strong>4:23</strong></span>
               <span>Human pages: <strong>0</strong></span>
             </div>`
    }
  ];

  const APPROVE_CLICK_DELAY = 5200;
  const LOOP_DELAY = 14000;

  let timers = [];
  function schedule(fn, delay) { timers.push(setTimeout(fn, delay)); }
  function clearTimers() { timers.forEach(clearTimeout); timers = []; }

  function addMessage(type, html) {
    const senderLabel = type === 'bot' ? 'Nightshift AI' : 'on-call';
    const msg = document.createElement('div');
    msg.className = 'hv-msg';
    msg.innerHTML =
      `<div class="hv-avatar ${type}">${type === 'bot' ? 'NS' : 'OC'}</div>` +
      `<div class="hv-msg-body">` +
        `<div class="hvm-sender ${type}">${senderLabel}</div>` +
        html +
      `</div>`;
    thread.appendChild(msg);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => msg.classList.add('visible'));
    });
    thread.scrollTop = thread.scrollHeight;
    return msg;
  }

  function run() {
    clearTimers();
    dot.className = 'hv-dot';
    statusLabel.textContent = 'Incident detected';
    statusLabel.className = 'hv-status-label';
    thread.innerHTML = '';

    MESSAGES.forEach(({ delay, type, html, resolved }) => {
      schedule(() => {
        addMessage(type, html);
        if (resolved) {
          dot.className = 'hv-dot resolved';
          statusLabel.textContent = 'Resolved autonomously';
          statusLabel.className = 'hv-status-label resolved';
        }
      }, delay);
    });

    schedule(() => {
      const btn = document.getElementById('hvApprove');
      if (btn) btn.classList.add('clicked');
    }, APPROVE_CLICK_DELAY);

    schedule(run, LOOP_DELAY);
  }

  setTimeout(run, 1700);
}());
</script>

<script src="/js/fuckslides.js"></script>
</body>
</html>
