<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To the demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1280px; height: 720px; overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #0B0D12;
      color: #fff;
    }
    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none;
      background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.045) 1px, transparent 0);
      background-size: 26px 26px;
    }

    .slide {
      position: relative; z-index: 1;
      width: 1280px; height: 720px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 90px;
      text-align: center;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes rec-pulse {
      0%,100% { transform: scale(1);   opacity: 1; box-shadow: 0 0 0 0 rgba(255,90,90,0.5); }
      50%     { transform: scale(1.14); opacity: 0.85; box-shadow: 0 0 0 14px rgba(255,90,90,0); }
    }
    @keyframes scale-in {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    .rec {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 34px;
      opacity: 0; animation: fade-up 0.5s ease forwards 0.2s;
    }
    .rec-dot {
      width: 16px; height: 16px; border-radius: 50%;
      background: #FF5A5A;
      animation: rec-pulse 1.6s ease-in-out infinite;
    }
    .rec-label {
      font-size: 13px; font-weight: 700; letter-spacing: 0.2em;
      text-transform: uppercase; color: #FF7A7A;
    }

    .headline {
      font-size: 82px; font-weight: 900; line-height: 1.02;
      letter-spacing: -0.035em; color: #fff;
      max-width: 1020px;
      opacity: 0; animation: scale-in 0.7s cubic-bezier(0.22,1,0.36,1) forwards 0.45s;
    }
    .headline .red { color: #FF5A5A; }

    .subtitle {
      margin-top: 26px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 18px; font-weight: 500; color: rgba(255,255,255,0.55);
      letter-spacing: 0.02em;
      opacity: 0; animation: fade-up 0.6s ease forwards 0.95s;
    }
    .subtitle b { color: #7FB0FF; font-weight: 700; }

    .steps {
      margin-top: 40px;
      display: flex; align-items: center; gap: 14px;
      opacity: 0; animation: fade-up 0.6s ease forwards 1.25s;
    }
    .step {
      font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px; padding: 9px 20px;
    }
    .step-arrow { color: rgba(255,255,255,0.3); font-size: 16px; }

    .footer {
      position: absolute; bottom: 28px; left: 0; right: 0;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      opacity: 0; animation: fade-up 0.6s ease forwards 1.5s;
    }
    .elastic-wordmark { font-size: 17px; font-weight: 700; color: rgba(255,255,255,0.65); }
  </style>
</head>
<body>
<div class="slide">

  <div class="headline">Demo <span class="red">Time!!</span></div>

  <div class="subtitle"><b>OTel Demo</b> &middot; live cluster &middot; real environment up</div>

  <div class="steps">
    <span class="step">Break it</span>
    <span class="step-arrow">&#8594;</span>
    <span class="step">Elastic catches it</span>
    <span class="step-arrow">&#8594;</span>
    <span class="step">Root cause in the UI</span>
    <span class="step-arrow">&#8594;</span>
    <span class="step">...then in Claude</span>
  </div>

  <div class="footer">
    <svg width="26" height="25" viewBox="0 0 245 236" xmlns="http://www.w3.org/2000/svg">
      <path d="M236.6 123.5a46.54 46.54 0 0 0-30.8-43.9A67 67 0 0 0 140.2 0 66.72 66.72 0 0 0 86 27.7a35.5 35.5 0 0 0-57.2 28.1A36.77 36.77 0 0 0 31 68.2a46.75 46.75 0 0 0-.1 88 66.66 66.66 0 0 0 119.6 51.6 35 35 0 0 0 21.7 7.6 35.51 35.51 0 0 0 35.5-35.5 36.77 36.77 0 0 0-2.2-12.4 47.08 47.08 0 0 0 31.1-44" fill="#fff"/>
      <path d="M93 101.5l51.8 23.6L197 79.3a54.71 54.71 0 0 0 1.1-11.5 58.35 58.35 0 0 0-106.5-33l-8.7 45.1L93 101.5z" fill="#fed10a"/>
      <path d="M39.4 156.3a56.62 56.62 0 0 0-1.1 11.7 58.58 58.58 0 0 0 107 32.9l8.6-44.9-11.5-22-52-23.7z" fill="#24bbb1"/>
      <path d="M39.1 66.7l35.5 8.4 7.8-40.3a28 28 0 0 0-43.3 31.9" fill="#ef5098"/>
      <path d="M36 75.2a39.1 39.1 0 0 0-1.7 73.7l49.8-45L75 84.4z" fill="#17a8e0"/>
      <path d="M154.3 200.9a28 28 0 0 0 43.2-31.9l-35.4-8.3z" fill="#93c83e"/>
      <path d="M161.5 151.4l39 9.1a39.1 39.1 0 0 0 1.7-73.7l-51 44.7z" fill="#0779a1"/>
    </svg>
    <span class="elastic-wordmark">elastic</span>
  </div>

</div>
<script src="/js/fuckslides.js"></script>
</body>
</html>
